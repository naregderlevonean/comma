[Settings]
language = en
folder = ~/Pictures/Wallpapers
monitors = All
wallpaper = ~/Pictures/Wallpapers/Feathers.png
show_path_in_tooltip = True
backend = hyprpaper
fill = fill
sort = name
color = #080808
subfolders = False
all_subfolders = False
show_hidden = False
show_gifs_only = False
zen_mode = True
post_command = ln -sf "$wallpaper" ~/.cache/wallpaper.png && for m in $(hyprctl monitors | grep "Monitor" | awk '{print $2}'); do hyprctl hyprpaper wallpaper "$m,$wallpaper"; done
number_of_columns = 3
swww_transition_type = any
swww_transition_step = 60
swww_transition_angle = 0
swww_transition_duration = 1
swww_transition_fps = 60
mpvpaper_sound = False
mpvpaper_options = --panscan=1.0 --window-maximized=yes --loop-file=inf
use_xdg_state = False
stylesheet = /home/naregderlevonean/.config/waypaper/style.css

