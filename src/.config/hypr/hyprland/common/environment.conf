env = CLUTTER_BACKEND, wayland

env = GDK_BACKEND, wayland, x11, *
env = GDK_DPI_SCALE, 1
env = GDK_SCALE, 1.5

env = GTK2_RC_FILES, "$HOME/.gtkrc-2.0"
env = GTK_USE_PORTAL, 0

env = HYPRCURSOR_SIZE, 24
env = HYPRCURSOR_THEME, rose-pine-cursor

env = JACK_NO_AUDIO_RESERVATION, 1
env = JACK_PROMISCUOUS_SERVER, pipewire

env = LIBVA_DRIVER_NAME, iHD

env = MOZ_ENABLE_WAYLAND, 1

env = QT_AUTO_SCREEN_SCALE_FACTOR, 1
env = QT_ENABLE_HIGHDPI_SCALING, 1
env = QT_QPA_PLATFORM, wayland
env = QT_QPA_PLATFORMTHEME, qt6ct
env = QT_SCALE_FACTOR, 1
env = QT_WAYLAND_DISABLE_WINDOWDECORATION, 1

env = PATH, $PATH:$HOME/.local/bin:$HOME/.cargo/bin

env = SDL_VIDEODRIVER, wayland
env = VDPAU_DRIVER, va_gl

env = WEBKIT_FORCE_COMPOSITING_MODE, 1

-env = WLR_NO_HARDWARE_CURSORS, 0

env = XCURSOR_SIZE, 24
env = XCURSOR_THEME, rose-pine-cursor

env = XDG_CURRENT_DESKTOP, Hyprland
env = XDG_SESSION_DESKTOP, Hyprland
env = XDG_SESSION_TYPE, wayland

env = __GL_SYNC_TO_VBLANK, 0
env = __GL_THREADED_OPTIMIZATIONS, 0
