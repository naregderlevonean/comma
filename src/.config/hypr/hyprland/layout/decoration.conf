decoration {
    rounding = 16
    rounding_power = 10

    fullscreen_opacity = 0.84
    active_opacity = 0.84
    inactive_opacity = 0.64

    dim_inactive = false
    dim_modal = true

    dim_around = 0.96
    dim_strength = 0.96
    dim_special = 0.96

    blur {
        size = 8
        passes = 3

        brightness = 0.40
        contrast = 1.60

        vibrancy = 0.40
        vibrancy_darkness = 0.40
        noise = 0.025

        popups = true
        popups_ignorealpha = 0.24

        ignore_opacity = true
    }

    shadow {
        color = 0x6f000000
        color_inactive = 0x29000000

        range = 16
        render_power = 4
        ignore_window = false
    }

    screen_shader = $shader/vibrant.glsl
}

