bind = $modifier $alternateLeft, Left, exec, hyprnome --previous --no-empty --keep-special
bind = $modifier $alternateLeft, Right, exec, hyprnome --keep-special

bind = $modifier $alternateLeft, Home, exec, hyprctl dispatch workspace $(hyprctl workspaces -j | jq 'map(select(.windows > 0)) | sort_by(.id) | .[0].id')
bind = $modifier $alternateLeft, End, exec, hyprctl dispatch workspace $(comm -23 <(seq 1 10 | sort) <(hyprctl workspaces -j | jq '.[] | .id' | sort) | head -n 1)
