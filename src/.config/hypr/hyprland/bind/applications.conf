bind = $modifier, 1, exec, kitty
bind = $modifier $controlLeft, 1, exec, kitty su

bind = $modifier, 2, exec, nautilus

bind = $modifier, 3, exec, firefox
bind = $modifier $controlLeft, 3, exec, firefox --private-window

bind = $modifier, 4, exec, obsidian

bind = $modifier, F4, exec, waypaper
bind = $modifier, F5, exec, gnome-calculator
bind = $modifier, F6, exec, dialect
bind = $modifier, F7, exec, gnome-characters
bind = $modifier, F8, exec, $script/screenshot
bind = $modifier, F9, exec, eyedropper
