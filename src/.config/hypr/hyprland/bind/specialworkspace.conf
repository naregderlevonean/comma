bindr = $modifier, $modifierLeft, exec, $script/submap-reset
bindr = $modifier, $modifierLeft, submap, specialworkspace
submap = specialworkspace
bind = $modifier, $modifierLeft, togglespecialworkspace
bind = $modifier, $modifierLeft, submap, reset
submap = reset

bindr = $modifier ALT, TAB, togglespecialworkspace, stylus
bindr = $modifier ALT, Grave, togglespecialworkspace, radio

bindr = $modifier ALT, Escape, workspace, +0
