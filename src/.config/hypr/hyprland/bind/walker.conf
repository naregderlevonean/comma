bind = , XF86Search, exec, walker

bindr = ALT, ALT_L, exec, $script/run-submap-reset-timer
bindr = ALT, ALT_R, exec, $script/run-submap-reset-timer

bindr = ALT, ALT_L, submap, walker
bindr = ALT, ALT_R, submap, walker
submap = walker
bind = ALT, ALT_L, exec, walker
bind = ALT, ALT_R, exec, walker
bind = ALT, ALT_L, submap, reset
bind = ALT, ALT_R, submap, reset
submap = reset

