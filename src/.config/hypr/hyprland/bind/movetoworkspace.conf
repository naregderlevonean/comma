bind = $modifier SHIFT ALT, Left, exec, hyprnome --previous --move --no-empty
bind = $modifier SHIFT ALT, Right, exec, hyprnome --move

bindo = $modifier SHIFT ALT, Left, movetoworkspace, e~0
bindo = $modifier SHIFT ALT, Right, movetoworkspace, empty

bind = $modifier SHIFT ALT, Up, movetoworkspace, special
bind = $modifier SHIFT ALT, Down, movetoworkspace, +0

bind = $modifier SHIFT ALT, Tab, movetoworkspace, special:stylus
bind = $modifier SHIFT ALT, Grave, movetoworkspace, special:radio

bind = $modifier SHIFT ALT, 1, movetoworkspace, special:ekam
bind = $modifier SHIFT ALT, 2, movetoworkspace, special:dva
bind = $modifier SHIFT ALT, 3, movetoworkspace, special:trini
bind = $modifier SHIFT ALT, 4, movetoworkspace, special:chatvari
bind = $modifier SHIFT ALT, 5, movetoworkspace, special:pancha
bind = $modifier SHIFT ALT, 6, movetoworkspace, special:shat
bind = $modifier SHIFT ALT, 7, movetoworkspace, special:sapta
bind = $modifier SHIFT ALT, 8, movetoworkspace, special:ashta
bind = $modifier SHIFT ALT, 9, movetoworkspace, special:nava
bind = $modifier SHIFT ALT, 0, movetoworkspace, special:shunya
