bind = $modifier CTRL ALT, Left, exec, hyprnome --previous --move --no-empty
bind = $modifier CTRL ALT, Right, exec, hyprnome --move

bind = $modifier CTRL ALT, Home, movetoworkspace, e~0
bind = $modifier CTRL ALT, End, movetoworkspace, empty

bind = $modifier CTRL ALT, Up, movetoworkspace, special
bind = $modifier CTRL ALT, Down, movetoworkspace, +0

bind = $modifier CTRL ALT, Tab, movetoworkspace, special:stylus
bind = $modifier CTRL ALT, Grave, movetoworkspace, special:radio

bind = $modifier CTRL ALT, 1, movetoworkspace, special:ekam
bind = $modifier CTRL ALT, 2, movetoworkspace, special:dva
bind = $modifier CTRL ALT, 3, movetoworkspace, special:trini
bind = $modifier CTRL ALT, 4, movetoworkspace, special:chatvari
bind = $modifier CTRL ALT, 5, movetoworkspace, special:pancha
bind = $modifier CTRL ALT, 6, movetoworkspace, special:shat
bind = $modifier CTRL ALT, 7, movetoworkspace, special:sapta
bind = $modifier CTRL ALT, 8, movetoworkspace, special:ashta
bind = $modifier CTRL ALT, 9, movetoworkspace, special:nava
bind = $modifier CTRL ALT, 0, movetoworkspace, special:shunya
