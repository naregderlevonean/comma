bind = $modifier ALT, 0, exec, hyprctl keyword general:layout monocle
bind = $modifier ALT, 1, exec, hyprctl keyword general:layout monocle && hyprctl keyword scrolling:column_width 1.00 && hyprctl keyword general:layout scrolling
bind = $modifier ALT, 2, exec, hyprctl keyword general:layout monocle && hyprctl keyword scrolling:column_width 0.50 && hyprctl keyword general:layout scrolling
bind = $modifier ALT, 3, exec, hyprctl keyword general:layout monocle && hyprctl keyword scrolling:column_width 0.33 && hyprctl keyword general:layout scrolling
bind = $modifier ALT, 4, exec, hyprctl keyword general:layout dwindle
bind = $modifier ALT, 5, exec, hyprctl keyword general:layout master
