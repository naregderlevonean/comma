layerrule {
    name = histui
    match:namespace = histui-notification
    above_lock = 2
    blur = true
    blur_popups = true
    ignore_alpha = 0.64
}

layerrule {
    name = hyprlock
    match:namespace = hyprlock
    xray = 1
}

layerrule {
    name = walker
    match:namespace = walker
    dim_around = on
}

layerrule {
    name = waybar
    match:namespace = waybar
    above_lock = 1
    animation = slide
    blur = true
    ignore_alpha = 0
    xray = true
}

layerrule {
    name = wvkbd
    match:namespace = wvkbd
    above_lock = 2
    animation = slide
    blur = true
}

