layerrule {
    name = walker
    match:namespace = walker
    dim_around = on
}

layerrule {
    name = wvkbd
    match:namespace = wvkbd
    animation = slide
    blur = true
}

layerrule {
    name = histui
    match:namespace = histui-notification
    blur = true
    blur_popups = true
    ignore_alpha = 0.64
}

layerrule {
    name = waybar
    match:namespace = waybar
    animation = slide
    blur = true
    ignore_alpha = 0
    xray = true
}


