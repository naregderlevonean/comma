windowrule {
    name = float
    match:float = true
    animation = fade
}

windowrule {
    name = stylus
    match:workspace = special:stylus 
    fullscreen = true
}

windowrule {
    name = zenity
    match:class = zenity
    above_lock = 2
    dim_around = on
}

windowrule {
    name = matrix
    match:title = matrix
    animation = fade 100%
    dim_around = on
    float = true
    fullscreen = true
    noanim = true
}

windowrule {
    name = calculator
    match:class = org.gnome.Calculator
    animation = slide
    float = true
    pin = true
}

windowrule {
    name = waypaper
    match:class = waypaper
    animation = slide
    float = true
    pin = true
}

windowrule {
    name = dialect
    match:class = app.drey.Dialect
    animation = slide
    float = true
    pin = true
}

windowrule {
    name = coulr
    match:class = com.github.finefindus.eyedropper
    float = true
    pin = true
    animation = slide
}

windowrule {
    name = characters
    match:class = org.gnome.Characters
    float = true
    pin = true
    animation = slide
}

windowrule {
    name = histui
    match:class = kitty
    match:title = histui
    float = true
    pin = true
    dim_around = on
}

windowrule {
	name = shimeji
	match:class = shimeji
	float = true
	no_blur = true
	no_focus = true
	no_shadow = true
	border_size = 0
}

windowrule {
    name = rnote
    match:class = com.github.flxzt.rnote
    fullscreen = true
    workspace = special:stylus
}
