plugin:touch_gestures {
    sensitivity = 2.0    
    long_press_delay = 1000
    workspace_swipe_fingers = 4
    edge_margin = 16

    hyprgrass-bind = , edge:u:d, exec, killall wvkbd-mobintl
    hyprgrass-bind = , edge:d:u, exec, pgrep wvkbd-mobintl || $script/run-wvkbd

    hyprgrass-bind = , edge:l:r, layoutmsg, cycleprev
    hyprgrass-bind = , edge:r:l, layoutmsg, cyclenext

    hyprgrass-bindm = , longpress:2, movewindow
   
    hyprgrass-bind = , swipe:2:r, swapwindow, r 
    hyprgrass-bind = , swipe:2:l, swapwindow, l

    hyprgrass-bind = , swipe:3:r, exec, hprnome --move
    hyprgrass-bind = , swipe:3:l, exec, hyprnome --move --previous

    hyprgrass-bind = , swipe:3:u, movetoworkspace, special:background
    hyprgrass-bind = , swipe:3:d, movetoworkspace, +0

    hyprgrass-bind = , swipe:4:d, killactive

    hyprgrass-gesture = swipe, 4, vertical, dispatcher, togglespecialworkspace, background

    hyprgrass-bind = , tap:5, exec, kitty

    hyprgrass-bind = , swipe:5:d, exec, pgrep walker || walker
    hyprgrass-bind = , swipe:5:u, exec, walker --close
}
