plugin:touch_gestures {
    edge_margin = 4
    long_press_delay = 1000
    sensitivity = 4.0
    workspace_swipe_fingers = 4

    hyprgrass-bind = , edge:u:d, exec, killall wvkbd-mobintl
    hyprgrass-bindl = , edge:u:d, exec, killall wvkbd-mobintl

    hyprgrass-bind = , edge:d:u, exec, pgrep wvkbd-mobintl || $script/on-screen-keyboard
    hyprgrass-bindl = , edge:d:u, exec, pgrep wvkbd-mobintl || $script/on-screen-keyboard

    hyprgrass-bindm = , longpress:2, movewindow
   
    hyprgrass-bind = , swipe:2:r, swapwindow, r 
    hyprgrass-bind = , swipe:2:l, swapwindow, l

    hyprgrass-bind = , swipe:2:d, exec, pgrep walker || walker
    hyprgrass-bind = , swipe:2:u, exec, walker --close

    hyprgrass-bind = , swipe:3:r, exec, hyprnome --move
    hyprgrass-bind = , swipe:3:l, exec, hyprnome --move --previous --no-empty

    hyprgrass-bind = , swipe:3:u, movetoworkspace, special
    hyprgrass-bind = , swipe:3:d, movetoworkspace, +0

    hyprgrass-gesture = swipe, 4, vertical, dispatcher, togglespecialworkspace

    hyprgrass-bind = , tap:5, exec, kitty
    hyprgrass-bind = , swipe:5:d, killactive

}
