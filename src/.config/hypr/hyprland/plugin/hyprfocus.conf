plugin:hyprfocus {
    mode = slide
    slide_height = 4

    bezier = linear, 0, 0, 1, 1
    bezier = easeInSine, 0.13, 0, 0.39, 0
    bezier = easeOutSine, 0.61, 1, 0.88, 1
	bezier = easeInOutSine, 0.37, 0, 0.63, 1
	bezier = easeInQuadratic, 0.11, 0, 0.5, 0
	bezier = easeOutQuadratic, 0.5, 1, 0.89, 1
	bezier = easeInOutQuadratic, 0.45, 0, 0.55, 1
	bezier = easeInCubic, 0.32, 0, 0.67, 0
	bezier = easeOutCubic, 0.33, 1, 0.68, 1
	bezier = easeInOutCubic, 0.65, 0, 0.35, 1
	bezier = easeInQuartic, 0.5, 0, 0.75, 0
	bezier = easeOutQuartic, 0.5, 0, 0.75, 0
	bezier = easeInOutQuartic, 0.5, 0, 0.75, 0
	bezier = easeInCircle, 0.55, 0, 1, 0.45
	bezier = easeOutCircle, 0, 0.55, 0.45, 1
	bezier = easeInOutCircle, 0, 0.55, 0.45, 1
    bezier = easeInExpo, 0.36, 0, 0.66, -0.56
    bezier = easeOutExpo, 0.21, 1, 0.3, 1
    bezier = easeInOutExpo, 0.87, 0, 0.13, 1
    bezier = easeInBack, 0.36, 0, 0.66, -0.56
    bezier = easeOutBack, 0.34, 1.56, 0.64, 1
    bezier = easeInOutBack, 0.68, -0.6, 0.32, 1.6
    
    animation = hyprfocusIn, 1, 3, easeInCubic
    animation = hyprfocusOut, 1, 5, easeOutExpo
r
