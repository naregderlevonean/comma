$shortDelay = 200
$mediumDelay = 500
$longDelay = 1000

$special = special:special
$radio = special:radio
$stylus = special:stylus

monrule = eDP-1, 4, 4

zone = , , bottom left, $shortDelay, exec, hyprnome --previous --no-empty --keep-special 
zone = , , bottom right, $shortDelay, exec, hyprnome --keep-special

zone = , , left, $longDelay, layoutmsg, cycleprev
zone = , , right, $longDelay, layoutmsg, cyclenext

zone = , , top right, $mediumDelay, exec, hyprlock

zone = , , top left, $mediumDelay, exec, walker
zone = , $special, top left, $mediumDelay, exec, walker

zone = , , top, $longDelay, togglespecialworkspace

zone = , $special, top, $longDelay, workspace, +0
zone = , $radio, top, $longDelay, workspace, +0
zone = , $stylus, top, $longDelay, workspace, +0

